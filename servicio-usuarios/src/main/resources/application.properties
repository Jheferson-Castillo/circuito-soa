spring.application.name=servicio-usuarios
server.port=8081

# ---------- Base de datos: usuarios_db (PostgreSQL) ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/usuarios_db
spring.datasource.username=postgres
spring.datasource.password=....
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# ---------- Email (Gmail) ----------
email.sender=test@test.com
email.username=test@test.com
email.password=test123
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=test123

# ---------- Subida de archivos ----------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------- JWT (Authorization Server propio, HS256) ----------
# SECRETO COMPARTIDO para firmar/validar el JWT. Debe tener >= 32 bytes (256 bits).
# Los Resource Servers (Pagos, Reservas, bus) usaran ESTE MISMO valor en la sub-fase 7B.
# En produccion: externalizar (variable de entorno JWT_SECRET) y cambiarlo.
security.jwt.secret=${JWT_SECRET:cambia-esta-clave-super-secreta-circuito-soa-2026-min-32-bytes-hs256}
# Vigencia del access token, en minutos.
security.jwt.expiration-minutes=120
