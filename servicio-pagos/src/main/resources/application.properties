spring.application.name=servicio-pagos
server.port=8082

# ---------- Base de datos: pagos_db (PostgreSQL) ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/pagos_db
spring.datasource.username=postgres
spring.datasource.password=.......
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# ---------- Integracion SOA: las llamadas inter-servicio salen por el bus ESB ----------
services.gateway-url=http://localhost:8080

# ---------- JWT (Resource Server) ----------
# DEBE ser EXACTAMENTE el mismo valor que en el servicio de Usuarios para validar la firma.
security.jwt.secret=${JWT_SECRET:cambia-esta-clave-super-secreta-circuito-soa-2026-min-32-bytes-hs256}

# ---------- Observabilidad (Spring Boot Actuator + Prometheus) ----------
# Exponemos por HTTP solo health, info y prometheus (las metricas que scrapea Prometheus).
management.endpoints.web.exposure.include=health,info,prometheus
# Mostramos el detalle del health (estado de DB, disco, etc.).
management.endpoint.health.show-details=always
