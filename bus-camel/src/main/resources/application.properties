spring.application.name=bus-camel
server.port=8080

# El servlet de Camel se registra manualmente (CamelServletConfig) mapeado a /*,
# para que el bus sea la unica puerta de entrada.
# Se excluye el auto-config de mapeo de camel-servlet 4.10.3 por incompatibilidad
# con Spring Boot 3.5.15 (MultipartProperties).
spring.autoconfigure.exclude=org.apache.camel.component.servlet.springboot.ServletMappingAutoConfiguration

# Nombre legible del contexto Camel
camel.springboot.name=bus-esb

# ---------- JWT (filtro del bus) ----------
# DEBE ser EXACTAMENTE el mismo valor que en Usuarios, Pagos y Reservas para validar la firma.
security.jwt.secret=${JWT_SECRET:cambia-esta-clave-super-secreta-circuito-soa-2026-min-32-bytes-hs256}
